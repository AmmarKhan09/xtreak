{% extends "layout.html" %}

{% block title %}
    Login
{% endblock %}

{% block main %}
    <noscript>
        <p style="color:red;">
            This website requires JavaScript to work. Please enable JavaScript.
        </p>
    </noscript>
    <form id="login_form" class="randl-form" action="/login" method="post">
        <div class="mb-3">
            <h2>Login</h2>
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input class="form-control my-form-1" autocomplete="off" autofocus type="text" name="username" id="login_username">
        </div>

        <div class="mb-3 password-wrapper">
            <label class="form-label">Password</label>

            <input class="form-control my-form-1 login-password" autocomplete="off" id="password" type="password" name="password">

            <span class="password_toggle" data-target="password">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#ccc" class="bi bi-eye-fill eye-open" viewBox="0 0 16 16">
                    <path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0"/>
                    <path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8m8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7"/>
                </svg>

                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#ccc" class="bi bi-eye-slash-fill eye-closed" viewBox="0 0 16 16">
                    <path d="m10.79 12.912-1.614-1.615a3.5 3.5 0 0 1-4.474-4.474l-2.06-2.06C.938 6.278 0 8 0 8s3 5.5 8 5.5a7 7 0 0 0 2.79-.588M5.21 3.088A7 7 0 0 1 8 2.5c5 0 8 5.5 8 5.5s-.939 1.721-2.641 3.238l-2.062-2.062a3.5 3.5 0 0 0-4.474-4.474z"/>
                    <path d="M5.525 7.646a2.5 2.5 0 0 0 2.829 2.829zm4.95.708-2.829-2.83a2.5 2.5 0 0 1 2.829 2.829zm3.171 6-12-12 .708-.708 12 12z"/>
                </svg>
            </span>
        </div>

        <div class="mb-3 form-check login-remember-checkbox">
            <input id="remember" name="remember" type="checkbox" class="form-check-input my-checkbox-1">
            <label for="remember" class="form-check-label">Remember me</label>
        </div>
        <span class="error"></span>
        <button class="btn btn-primary my-btn-1" type="submit">Login</button>
    </form>
    <form action="/register" method="get">
        <button class="btn btn-link" type="submit">Don't have an account? Register</button>
{% endblock %}
