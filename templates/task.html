{% extends "layout.html" %}

{% block title %}
    {{ task["task_name"] }}
{% endblock %}

{% block main %}
    <div class="modal fade" id="deleteTaskModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Delete Task</h5>
                    <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    Are you sure you want to delete this task and its streaks? This cannot be undone.
                </div>

                <div class="modal-footer">
                    <button class="btn btn-primary my-btn-1" data-bs-dismiss="modal">Cancel</button>

                    <form action="{{ url_for('delete_task', id=task.id) }}" method="post">
                        <button class="btn btn-primary my-btn-1 delete-btn">Delete</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="stats-container">
        <div class="stat">
            <span class="label">Current</span>
            <div class="value">
                <span class="fire-icon-wrapper">
                    <i class="bi bi-fire {% if is_today_done %}lit today{% endif %}"></i>
                </span>
                <span id="current">{{ current }}</span>
            </div>
        </div>

        <div class="divider"></div>

        <div class="stat">
            <span class="label">Best</span>
            <div class="value">
                <span class="trophy-icon-wrapper">
                    <i class="bi bi-trophy-fill"></i>
                </span>
                <span id="longest">{{ longest }}</span>
            </div>
        </div>
    </div>
    
    <div class="calendar-container">
        <div id="calendar" data-task-id="{{ task.id }}"></div>
    </div>

    <script>
        window.initialMarkedDates = {{ initial_marked_dates | safe }};
    </script>

    <div class="mb-3 description-container">
        <form id="update_description" action="/update_description" method="post" data-id="{{ task.id }}">
            <label for="taskDescription2" class="form-label">Description</label>
            <textarea class="form-control my-form-1 my-form-2" type="text" name="taskDescription" id="taskDescription2" maxlength="1000">{{ task.description }}</textarea>
            <span class="error"></span>
            <span class="success"></span>
            <button class="btn btn-primary my-btn-1" type="submit">Save Description</button>
        </form>
    </div>

    <div class="mb-3 task-created-container">
        <span id="task-created" data-time="{{ iso }}"></span>
    </div>
{% endblock %}
